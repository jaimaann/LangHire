name: naukri
display_name: Naukri
version: "1.0.0"
author: langhire
description: "Naukri.com job search for India with Quick Apply"
countries: [IN]
website: https://www.naukri.com
requires_login: true
login_url: https://www.naukri.com/nlogin/login

auth_cookies:
  - name: nauk_at
    domain: .naukri.com
  - name: NKWAP
    domain: .naukri.com

search_url: "https://www.naukri.com/{title}-jobs-in-{location}?experience=0&jobAge=7"

collection_prompt: |
  FIRST — LOGIN CHECK:
  1. Go to https://www.naukri.com/mnjuser/profile to check if you're logged into Naukri.
     - If you see your profile page → logged in ✓
     - If you see a login page → WAIT for user to log in manually. Check every 15 seconds. Wait up to 5 minutes.

  THEN: Navigate to the Naukri search page:
  {search_url}

  If that URL doesn't load results, use the search form:
  - Go to https://www.naukri.com
  - Enter "{title}" in the search/skills field
  - Enter "{location}" in the location field
  - Click Search

  HOW TO COLLECT JOBS:
  1. You will see a list of job cards on the search results page.
  2. For each job card, extract:
     - Job title
     - Company name
     - Location
     - Experience range (if shown)
     - Full job URL (click the title or right-click to get link)
     - Whether it shows "Apply" on Naukri itself (easy_apply: true) or redirects externally (easy_apply: false)
  3. Click on each job card to get the full URL and details.
  4. Output a @@JOB_FOUND marker for each job.
  5. Navigate to the next page of results.
  6. Repeat until you have {max_jobs} jobs or run out of results.

  IMPORTANT RULES:
  - Output ONE @@JOB_FOUND marker per job in your MEMORY field.
  - Do NOT apply to any jobs — only collect listings.
  - Naukri may show "Apply on company site" for some jobs — still collect them with easy_apply: false.
  - Stop after collecting {max_jobs} NEW jobs and call done.
  - If you encounter a CAPTCHA, wait 10 seconds and try to proceed. If stuck, call done with what you have.

  @@JOB_FOUND format:
  @@JOB_FOUND: {{"title": "<job title>", "company": "<company>", "location": "<location>", "url": "<full Naukri job URL>", "easy_apply": true/false}}

apply_prompt: |
  FIRST — LOGIN CHECK:
  1. Go to https://www.naukri.com/mnjuser/profile to check if you're logged into Naukri.
     - If you see your profile page → logged in ✓
     - If redirected to login → WAIT for user to log in. Check every 15 seconds. Wait up to 5 minutes.

  THEN: Go to {job_url}

  If this job has an "Apply" button on Naukri:
  - Click the "Apply" or "Apply on Naukri" button.
  - A form or popup may appear asking for:
    - Resume (upload from {resume_path})
    - Notice period (use value from candidate profile)
    - Current CTC and Expected CTC
    - Screening questions
  - Fill all fields from the candidate profile.
  - Answer screening questions using the Q&A bank.
  - Submit the application.

  If this job redirects to company site ("Apply on company site"):
  - Click through to the external application page.
  - Navigate to find the application form.
  - Fill all fields from candidate profile.
  - Upload resume at {resume_path}.

  IMPORTANT:
  - Use DD/MM/YYYY date format for all date fields.
  - If asked about notice period, answer from the candidate profile.
  - If asked about current/expected CTC, use salary expectation in INR.
  - If you encounter a CAPTCHA and cannot solve it, report failure.
  - If the form is broken after 3 attempts, report failure and stop.

domain_patterns:
  - pattern: "*.naukri.com"
    normalize_to: "naukri.com"
