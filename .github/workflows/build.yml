name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          pip install uv
          uv sync

      - name: Build Python backend (PyInstaller)
        run: bash scripts/build-backend.sh
        if: runner.os != 'Windows'

      - name: Build Python backend (PyInstaller, Windows)
        run: powershell -ExecutionPolicy Bypass -File scripts/build-backend.ps1
        if: runner.os == 'Windows'

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Job Applicant ${{ github.ref_name }}'
          releaseBody: |
            ## 📦 Download

            | OS | File |
            |----|------|
            | macOS (Apple Silicon) | `.dmg` |
            | macOS (Intel) | `.dmg` |
            | Windows | `.exe` installer |
            | Linux | `.AppImage` or `.deb` |

            ### What's New
            See the [release notes](https://github.com/${{ github.repository }}/releases) for details.

            ### Prerequisites
            - Python 3.13+ installed on your system
            - Run `python -m playwright install chromium` after installing
            - An LLM API key (OpenAI, Anthropic, or AWS Bedrock)
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  # Notify on completion
  notify:
    needs: build-tauri
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS ARM64 | ${{ needs.build-tauri.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS x64 | ${{ needs.build-tauri.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 | ${{ needs.build-tauri.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x64 | ${{ needs.build-tauri.result }} |" >> $GITHUB_STEP_SUMMARY
